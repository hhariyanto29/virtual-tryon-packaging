version: '3.8'

services:
  bungkus-indonesia-tool:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    container_name: bungkus-indonesia-tool
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/var/log/nginx

  # Development service (optional)
  bungkus-indonesia-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    container_name: bungkus-indonesia-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0